<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>CODEZILLA | Matrix Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* شريط العنوان */
        #top-bar {
            background: #111;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f0;
            box-shadow: 0 0 15px #0f0;
            z-index: 10;
        }

        .title {
            font-size: 1.8em;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: glitch 2s infinite;
        }

        /* منطقة العمل */
        #main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .editor-section {
            flex: 1;
            border-right: 1px solid #0f0;
            position: relative;
        }

        /* تخصيص شكل المحرر */
        .CodeMirror {
            height: 100% !important;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.9) !important;
        }

        /* نافذة النتائج */
        #preview-section {
            width: 40%;
            display: flex;
            flex-direction: column;
            background: #050505;
        }

        .terminal-header {
            background: #0f0;
            color: #000;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 0.8em;
        }

        #terminal {
            flex: 1;
            padding: 15px;
            color: #0f0;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            line-height: 1.5;
        }

        /* أزرار الأوامر */
        .run-btn {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px 25px;
            cursor: pointer;
            font-family: 'Courier New';
            font-weight: bold;
            transition: 0.3s;
        }

        .run-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        /* تأثير الجليتش */
        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; }
