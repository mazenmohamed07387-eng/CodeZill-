<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>CODEZILLA | HACKER EDITION</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; background: #000; color: #0f0;
            font-family: 'Consolas', monospace; overflow: hidden;
        }

        /* الهيكل الرئيسي */
        .container { display: flex; height: 100vh; flex-direction: column; }
        
        /* شريط التحكم */
        .toolbar {
            background: #111; padding: 10px; border-bottom: 2px solid #0f0;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #0f0; }

        .btn-run {
            background: #0f0; color: #000; border: none; padding: 10px 25px;
            cursor: pointer; font-weight: bold; border-radius: 4px;
        }

        .btn-run:hover { background: #0a0; box-shadow: 0 0 15px #0f0; }

        /* منطقة التكويد */
        .workspace { display: flex; flex: 1; }
        
        textarea {
            width: 50%; height: 100%; background: #050505; color: #0f0;
            border: none; padding: 20px; font-size: 16px; outline: none;
            resize: none; border-right: 1px solid #222;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        /* نافذة العرض والـ Terminal */
        .output-zone { width: 50%; display: flex; flex-direction: column; background: #fff; }
        
        #terminal {
            height: 40%; background: #000; color: #0f0; 
            padding: 15px; overflow-y: auto; font-size: 14px;
            border-top: 2px solid #0f0;
        }

        iframe { flex: 1; border: none; width: 100%; background: #fff; }

        .label { background: #222; color: #0f0; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <div class="logo">CODEZILLA://SYSTEM_v3</div>
        <button class="btn-run" onclick="runProject()">RUN_CODE [F5]</button>
    </div>

    <div class="workspace">
        <textarea id="editor" placeholder="اكتب كود HTML أو JavaScript هنا..." spellcheck="false">
<h1>Hello Codezilla</h1>
<script>
  console.log("تم تشغيل النظام بنجاح...");
  document.body.style.background = "#000";
  document.body.style.color = "#0f0";
</script>

<style>
  h1 { text-align: center; margin-top: 50px; text-shadow: 0 0 10px #0f0; }
</style>
        </textarea>

        <div class="output-zone">
            <div class="label">LIVE_PREVIEW</div>
            <iframe id="viewer"></iframe>
            <div class="label">SYSTEM_TERMINAL</div>
            <div id="terminal">// المخرجات تظهر هنا...</div>
        </div>
    </div>
</div>

<script>
    function runProject() {
        const code = document.getElementById('editor').value;
        const terminal = document.getElementById('terminal');
        const viewer = document.getElementById('viewer').contentWindow.document;

        // مسح الـ Terminal عند كل تشغيل
        terminal.innerHTML = "Initializing...<br>";

        try {
            // 1. حقن الكود داخل الـ iframe للمعاينة
            viewer.open();
            viewer.write(code);
            viewer.close();

            // 2. محاكاة الـ Console.log ليعمل داخل الـ Terminal الخاص بنا
            const iframeWindow = document.getElementById('viewer').contentWindow;
            iframeWindow.console.log = function(message) {
                terminal.innerHTML += `<span style="color:#0f0;">[LOG]: ${message}</span><br>`;
            };
